      tailwind.config = {
        darkMode: 'class',

          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#fff7ed',
                100: '#ffedd5',

                600: '#ea580c',
                700: '#c2410c',
                800: '#9a3412',
                900: '#7c2d12',
              }
            }
          },
        },
      }

    <style>
      /* Custom Spin animation */
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 3s linear infinite;
      }

      /* Transitions */
      .animate-in {
        animation-duration: 0.3s;
        animation-fill-mode: both;
      }
      .fade-in {
        animation-name: fadeIn;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .slide-in-from-left-2 {
        animation-name: slideInLeft2;
      }
      @keyframes slideInLeft2 {
        from { transform: translateX(-0.5rem); }
        to { transform: translateX(0); }
      }

      /* Custom Scrollbar for heavy tables - Green, Purple and Orange styled main scrollbar */
      ::-webkit-scrollbar {
        -webkit-appearance: none !important;
        width: 10px !important;
        height: 10px !important;
        display: block !important;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.04) !important; 
        border-radius: 9999px !important;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #22c55e 0%, #a855f7 50%, #f97316 100%) !important; 
        border-radius: 9999px !important;
        border: 2px solid transparent !important;
        background-clip: padding-box !important;
        min-height: 40px !important;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #15803d 0%, #7e22ce 50%, #c2410c 100%) !important; 
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        background-clip: padding-box !important;
      }

      /* Force vertical scrollbar track/thumb to always show up and down on all platforms, including mobile phones */
      .custom-scrollbar,
      .always-scrollbar {
        overflow-y: scroll !important;
        -webkit-overflow-scrolling: auto !important;
      }

      /* Hide scrollbar utility */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Markdown & ContentEditable Table Styles */
      .markdown-body table, [contenteditable="true"] table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 1rem;
        background-color: transparent;
      }
      .markdown-body th, .markdown-body td, [contenteditable="true"] th, [contenteditable="true"] td {
        border: 1px solid #cbd5e1; /* visible border */
        padding: 0.5rem 0.75rem;
        text-align: left;
      }
      .markdown-body th, [contenteditable="true"] th {
        background-color: #f8fafc;
        font-weight: 600;
        color: #334155;
      }
      .markdown-body tr:nth-child(even), [contenteditable="true"] tr:nth-child(even) {
        background-color: #f8fafc;
      }
      .markdown-body strong, [contenteditable="true"] strong {
        font-weight: bold;
      }
      .markdown-body p, [contenteditable="true"] p {
        margin-bottom: 1rem;
      }
      .markdown-body a, [contenteditable="true"] a {
        color: #2563eb;
        text-decoration: underline;
      }
      
      /* Animation for Superhero LTR */
      @keyframes flyAcross {
        0% { transform: translate(-100vw, 20vh) rotate(5deg) scale(0.5); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translate(100vw, -20vh) rotate(5deg) scale(1); opacity: 0; }
      }
      
      /* Animation for Superhero RTL */
      @keyframes flyAcrossRTL {
        0% { transform: translate(100vw, 20vh) rotate(-5deg) scale(0.5) scaleX(-1); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translate(-100vw, -20vh) rotate(-5deg) scale(1) scaleX(-1); opacity: 0; }
      }

      .flying-hero-ltr {
        animation: flyAcross 10s linear forwards;
      }
      
      .flying-hero-rtl {
        animation: flyAcrossRTL 10s linear forwards;
      }

      /* Paper Pattern Classes */
      .paper-ruled {
        background-color: #ffffff !important;
        background-image: linear-gradient(#f1f5f9 2px, transparent 2px) !important;
        background-size: 100% 2.25rem !important;
        background-attachment: local !important;
      }
      
      .paper-grid {
        background-color: #ffffff !important;
        background-image: 
          linear-gradient(#f1f5f9 1px, transparent 1px) !important,
          linear-gradient(90deg, #f1f5f9 1px, transparent 1px) !important;
        background-size: 1.5rem 1.5rem !important;
        background-attachment: local !important;
      }
      
      .paper-dots {
        background-color: #ffffff !important;
        background-image: radial-gradient(#e2e8f0 2px, transparent 2px) !important;
        background-size: 1.5rem 1.5rem !important;
        background-attachment: local !important;
      }

      .paper-dots-sparse {
        background-color: #ffffff !important;
        background-image: radial-gradient(#e2e8f0 2px, transparent 2px) !important;
        background-size: 3rem 3rem !important;
        background-attachment: local !important;
      }

      .paper-stardust {
        background-color: #f5f3ff !important;
        background-image: 
          radial-gradient(rgba(99, 102, 241, 0.15) 1.5px, transparent 1.5px) !important,
          radial-gradient(rgba(139, 92, 246, 0.1) 2px, transparent 2px) !important;
        background-size: 2rem 2rem, 3.5rem 3.5rem !important;
        color: #1e1b4b !important;
        background-attachment: local !important;
      }

      .paper-engineering {
        background-color: #f0f9ff !important;
        background-image: 
          linear-gradient(rgba(14, 165, 233, 0.1) 1px, transparent 1px) !important,
          linear-gradient(90deg, rgba(14, 165, 233, 0.1) 1px, transparent 1px) !important;
        background-size: 1rem 1rem !important;
        background-attachment: local !important;
      }

      .paper-grid-emerald {
        background-color: #ecfdf5 !important;
        background-image: 
          linear-gradient(rgba(16, 185, 129, 0.1) 1px, transparent 1px) !important,
          linear-gradient(90deg, rgba(16, 185, 129, 0.1) 1px, transparent 1px) !important;
        background-size: 1.5rem 1.5rem !important;
        background-attachment: local !important;
      }

      .paper-ruled-crimson {
        background-color: #fff1f2 !important;
        background-image: linear-gradient(rgba(225, 29, 72, 0.1) 2px, transparent 2px) !important;
        background-size: 100% 2.25rem !important;
        background-attachment: local !important;
      }

      .paper-engineering-cyan {
        background-color: #ecfeff !important;
        background-image: 
          linear-gradient(rgba(8, 145, 178, 0.1) 1px, transparent 1px) !important,
          linear-gradient(90deg, rgba(8, 145, 178, 0.1) 1px, transparent 1px) !important;
        background-size: 1rem 1rem !important;
        background-attachment: local !important;
      }

      .paper-isometric {
        background-color: #ffffff !important;
        background-image: 
          linear-gradient(30deg, #f1f5f9 12%, transparent 12.5%, transparent 87%, #f1f5f9 87.5%, #f1f5f9),
          linear-gradient(150deg, #f1f5f9 12%, transparent 12.5%, transparent 87%, #f1f5f9 87.5%, #f1f5f9),
          linear-gradient(30deg, #f1f5f9 12%, transparent 12.5%, transparent 87%, #f1f5f9 87.5%, #f1f5f9),
          linear-gradient(150deg, #f1f5f9 12%, transparent 12.5%, transparent 87%, #f1f5f9 87.5%, #f1f5f9),
          linear-gradient(60deg, #e2e8f0 25%, transparent 25.5%, transparent 75%, #e2e8f0 75%, #e2e8f0),
          linear-gradient(60deg, #e2e8f0 25%, transparent 25.5%, transparent 75%, #e2e8f0 75%, #e2e8f0) !important;
        background-size: 40px 70px !important;
        background-attachment: local !important;
      }

      /* PRINT SPECIFIC STYLES FOR EXPORTING ID CARDS */
      @media print {
        /* Hide everything by default */
        body * {
          visibility: hidden;
          margin: 0;
          padding: 0;
        }

        /* Specifically show the print area */
        .id-print-area, .id-print-area * {
          visibility: visible;
        }

        /* Layout for printing cards */
        .id-print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          display: grid !important;
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 20px !important;
          padding: 20px !important;
          background: white !important;
          visibility: visible !important;
        }

        /* Ensure card wrapper handles breaks */
        .print-card-wrapper {
          page-break-inside: avoid;
          margin-bottom: 20px;
        }

        /* Hide specific elements marked as no-print */
        .no-print {
          display: none !important;
        }

        /* Remove scaling for print */
        .scale-\[0\.85\] {
          transform: scale(1) !important;
        }

        /* Remove shadows and backgrounds of the app that are not the cards */
        #root {
          background: white !important;
        }
      }

      /* RESPONSIVE SCROLLBARS FOR ROTATED MOBILE DEVICES & SHORT SCREEN HEIGHTS */
      @media (max-height: 768px) {
        /* Allow main container to scroll naturally */
        main {
          overflow-y: auto !important;
          height: auto !important;
        }
        
        /* Allow the outer expense tracker container to grow and scroll */
        .expense-tracker-container {
          overflow-y: auto !important;
          height: auto !important;
        }
        
        /* Make columns wrapper stack vertically on short views */
        .expense-columns-wrapper {
          flex-direction: column !important;
          height: auto !important;
          overflow: visible !important;
        }
        
        /* Allow left and right panels to expand to full content heights */
        .expense-column {
          width: 100% !important;
          max-width: 100% !important;
          height: auto !important;
          overflow: visible !important;
        }
        
        .expense-column > div,
        .expense-column .flex-1,
        .expense-column .overflow-y-auto {
          height: auto !important;
          overflow: visible !important;
        }
        
        /* Disable custom scrollbars nesting in the columns to let browser scroll smoothly */
        .expense-column .custom-scrollbar-amber {
          overflow-y: visible !important;
        }
      }
    </style>
